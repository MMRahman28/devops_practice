apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: app-sa-binding
    namespace: dev
subjects:
- kind: ServiceAccount
  name: app-sa
  namespace: dev
roleRef:
    kind: Role
    name: developer-readonly    # or developer-admin if you want more access
    apiGroup: rbac.authorization.k8s.io

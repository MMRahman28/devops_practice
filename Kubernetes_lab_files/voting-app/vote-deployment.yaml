apiVersion: apps/v1
kind: Deployment
metadata:
    name: vote
spec:
    replicas: 2
    selector:
        matchLabels:
            app: vote
    template:
        metadata:
            labels:
                app: vote
        spec:
            containers:
            - name: vote
              image: dockersamples/examplevotingapp_vote # A simple open-source voring UI
              ports:
              - containerPort: 80
              env:
              - name: REDIS_HOST
                value: redis

